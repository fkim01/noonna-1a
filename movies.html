<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FredSteam</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141414;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4%;
      height: 60px;
      background: linear-gradient(to bottom, #000 0%, transparent 100%);
      background-color: #000;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      color: #e50914;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .nav-right {
      font-size: 0.85rem;
      color: #aaa;
    }

    /* HERO */
    #hero {
      position: relative;
      width: 100%;
      height: min(56vw, 500px);
      overflow: hidden;
      background: #000;
    }

    #hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.6s;
    }

    #hero-img.loaded { opacity: 1; }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #141414 0%, transparent 60%),
                  linear-gradient(to right, rgba(0,0,0,0.6) 0%, transparent 60%);
    }

    .hero-info {
      position: absolute;
      bottom: 12%;
      left: 4%;
      max-width: min(500px, 90%);
    }

    .hero-title {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
      margin-bottom: 0.5rem;
    }

    .hero-desc {
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      color: #ddd;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 1rem;
      padding: 0.55rem 1.4rem;
      border: none;
      border-radius: 4px;
      background: #e50914;
      color: #fff;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .hero-btn:hover { background: #b81d24; }

    /* SECTION */
    section {
      padding: 1.5rem 4%;
    }

    section h2 {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: #e5e5e5;
    }

    /* GRID */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    @media (min-width: 500px) {
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    @media (min-width: 900px) {
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }

    /* CARD */
    .card {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: #1f1f1f;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .card:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      z-index: 10;
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
    }

    .card-info {
      padding: 8px 10px 10px;
    }

    .card-title {
      font-size: clamp(0.7rem, 1.5vw, 0.85rem);
      font-weight: 600;
      color: #e5e5e5;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-rating {
      margin-top: 4px;
      font-size: 0.72rem;
      color: #46d369;
      font-weight: 700;
    }

    /* RATING BADGE */
    .badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.75);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #46d369;
    }

    /* SKELETON */
    .skeleton {
      border-radius: 6px;
      background: #1f1f1f;
      overflow: hidden;
    }

    .skeleton-img {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }

    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      margin: 8px 10px 4px;
      background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }

    .skeleton-line.short { width: 60%; margin-bottom: 10px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* MODAL */
    #modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #modal-bg.open { display: flex; }

    #modal {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      width: min(500px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }

    #modal-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 10;
      line-height: 1;
    }

    #modal img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: block;
    }

    #modal-body {
      padding: 1.2rem 1.4rem 1.6rem;
    }

    #modal-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    #modal-meta {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.8rem;
    }

    #modal-desc {
      font-size: 0.9rem;
      color: #ccc;
      line-height: 1.6;
    }

    /* ERROR */
    #error-msg {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
    }

    #error-msg .emoji { font-size: 3rem; margin-bottom: 0.5rem; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: #555;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">FredSteam</div>
  <div class="nav-right">Now Playing</div>
</nav>

<!-- HERO -->
<div id="hero">
  <img id="hero-img" src="" alt="Featured Movie" />
  <div class="hero-overlay"></div>
  <div class="hero-info">
    <div class="hero-title" id="hero-title"></div>
    <div class="hero-desc" id="hero-desc"></div>
    <button class="hero-btn" id="hero-btn">&#9654; More Info</button>
  </div>
</div>

<!-- GRID SECTION -->
<section>
  <h2>Now Playing in Theaters</h2>
  <div class="movie-grid" id="grid"></div>
  <div id="error-msg">
    <div class="emoji">🎬</div>
    <p>Could not load movies. Check your connection and try again.</p>
  </div>
</section>

<!-- MODAL -->
<div id="modal-bg">
  <div id="modal">
    <button id="modal-close">&times;</button>
    <img id="modal-img" src="" alt="" />
    <div id="modal-body">
      <div id="modal-title"></div>
      <div id="modal-meta"></div>
      <div id="modal-desc"></div>
    </div>
  </div>
</div>

<footer>Data provided by <a href="https://www.themoviedb.org" style="color:#e50914;text-decoration:none;">TMDb</a></footer>

<script>
  const API_KEY = '47f9b82479e5e3ceef8d3010e0af851e';
  const BASE_URL = 'https://api.themoviedb.org/3';
  const IMG_BASE  = 'https://image.tmdb.org/t/p/';

  let movies = [];

  // Skeletons while loading
  const grid = document.getElementById('grid');
  for (let i = 0; i < 12; i++) {
    grid.innerHTML += `
      <div class="skeleton">
        <div class="skeleton-img"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>`;
  }

  async function fetchMovies() {
    try {
      const res = await fetch(
        `${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=en-US&page=1`
      );
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      movies = data.results.filter(m => m.poster_path);
      renderHero(movies[0]);
      renderGrid(movies);
    } catch (e) {
      grid.innerHTML = '';
      document.getElementById('error-msg').style.display = 'block';
      console.error(e);
    }
  }

  function renderHero(movie) {
    if (!movie) return;
    const heroImg = document.getElementById('hero-img');
    const backdrop = movie.backdrop_path
      ? `${IMG_BASE}original${movie.backdrop_path}`
      : `${IMG_BASE}w780${movie.poster_path}`;

    heroImg.src = backdrop;
    heroImg.onload = () => heroImg.classList.add('loaded');
    document.getElementById('hero-title').textContent = movie.title;
    document.getElementById('hero-desc').textContent = movie.overview;
    document.getElementById('hero-btn').onclick = () => openModal(movie);
  }

  function renderGrid(list) {
    grid.innerHTML = '';
    list.forEach(movie => {
      const card = document.createElement('div');
      card.className = 'card';
      const score = Math.round(movie.vote_average * 10);
      card.innerHTML = `
        <img
          src="${IMG_BASE}w342${movie.poster_path}"
          alt="${movie.title}"
          loading="lazy"
          onerror="this.style.background='#333'"
        />
        <span class="badge">${score}%</span>
        <div class="card-info">
          <div class="card-title">${movie.title}</div>
          <div class="card-rating">${starRating(movie.vote_average)}</div>
        </div>`;
      card.addEventListener('click', () => openModal(movie));
      grid.appendChild(card);
    });
  }

  function starRating(avg) {
    const stars = Math.round(avg / 2);
    return '★'.repeat(stars) + '☆'.repeat(5 - stars);
  }

  // Modal
  const modalBg   = document.getElementById('modal-bg');
  const modalClose = document.getElementById('modal-close');

  function openModal(movie) {
    const img = movie.backdrop_path
      ? `${IMG_BASE}w780${movie.backdrop_path}`
      : `${IMG_BASE}w500${movie.poster_path}`;
    document.getElementById('modal-img').src = img;
    document.getElementById('modal-title').textContent = movie.title;
    document.getElementById('modal-meta').textContent =
      `${movie.release_date?.slice(0,4) || ''}  •  ⭐ ${movie.vote_average.toFixed(1)} / 10  •  ${movie.vote_count.toLocaleString()} votes`;
    document.getElementById('modal-desc').textContent =
      movie.overview || 'No description available.';
    modalBg.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalBg.classList.remove('open');
    document.body.style.overflow = '';
  }

  modalClose.addEventListener('click', closeModal);
  modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  fetchMovies();
</script>
</body>
</html>
